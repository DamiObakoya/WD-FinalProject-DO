<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Campus Sports Hub</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Header -->
<header class="bg-dark text-white text-center p-3">
    <h1>Campus Sports Hub</h1>

    <nav>
        <a href="index.html" class="text-white mx-2">Home</a>
        <a href="teams.html" class="text-white mx-2">Teams</a>
        <a href="schedule.html" class="text-white mx-2">Schedule</a>
        <a href="players.html" class="text-white mx-2">Players</a>
    </nav>
</header>

<!-- Main -->
<main class="container mt-4">

    <h2 class="text-center mb-4">Welcome to Campus Sports</h2>

    <div class="row">

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Featured Team</h4>
                <p>Placeholder content</p>
                <button class="btn btn-primary" onclick="comingSoon()">View Team</button>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Upcoming Games</h4>
                <p>Games will appear here</p>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h4>Live Sports Data</h4>
                <div id="apiData">Loading...</div>
            </div>
        </div>

    </div>

</main>

<!-- Footer -->
<footer class="text-center p-3 mt-4 bg-light">
    <p>Campus Sports Hub © 2026</p>
</footer>

<script src="js/script.js"></script>
</body>
</html>
